apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: codereviewer

spec:
  replicas: 1

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1

  selector:
    matchLabels:
      app: ai-service

  template:
    metadata:
      labels:
        app: ai-service

    spec:
      containers:
      - name: ai-service
        image: thanusri22/ai-service:v2
        imagePullPolicy: Always

        envFrom:
        - configMapRef:
            name: coderaptor-config

        - secretRef:
            name: kv-secret

        env:
        - name: AZURE_OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: kv-secret
              key: AZURE_OPENAI_API_KEY

        ports:
        - containerPort: 8003

        resources:
          requests:
            cpu: 10m
            memory: 128Mi

        volumeMounts:
        - name: secrets-store-inline
          mountPath: /mnt/secrets-store
          readOnly: true

      volumes:
      - name: secrets-store-inline
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: kv-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: codereviewer
spec:
  selector:
    app: ai-service
  ports:
  - port: 8003
    targetPort: 8003
  type: ClusterIP
